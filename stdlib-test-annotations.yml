---
# This file defines metadata about Python standard library tests.
#
# The file consists of keys defining different groups of annotations.
# See each key for documentation.
#
# All entries share a common set of fields to support describing the
# annotation and filtering which annotations apply to which builds.
#
# * reason - human readable context describing the failure
# * targets - list of regular expressions matching target triples to
#.  determine if rule is active. Missing or empty matches all targets.
# * ignore-targets - list of regular expressions matching target tripels
#.  to determine if rule is ignored. Takes precedence over "targets."
# * minimum-python-version - X.Y Python version we must be equal or newer
#.  to for the rule to apply.
# * maximum-python-version - X.Y Python version we must be equal or less
#.  than for the rule to apply.
# * build-option - A build option (e.g. `pgo`) that must be present for this
#.  rule to be enabled.
# * no-build-option - A build option (e.g. `freethreaded`) that must not be
#.  present for this rule to be enabled.

# harness-skips declares builds to skip running the Python stdlib test harness.
#
# Ideally this feature doesn't need to exist. But sometimes the test harness is
# so broken we need to do this.
harness-skips:
  - name: "musl-debug-skip-3.14+"
    reason: "`cannot get C stack on this system` error leads to widespread failure"
    minimum-python-version: "3.14"
    targets:
      - ".+-unknown-linux-musl"
    build-option: "debug"

# module-excludes annotates modules to exclude from loading.
#
# The stdlib test runner applies this filter based on the name of the
# module file/directory within a directory. So values here need to be
# child most module paths. e.g. to exclude module `foo.bar.baz`, you
# need to use module name `baz` and not `foo.bar.baz`.
module-excludes:
  - module: test_call
    targets:
      - ".+-unknown-linux-musl"
    build-option: "static"
    reason: "import failure due to missing _testcapi"
    maximum-python-version: "3.12"

  - module: test_capi
    targets:
      - ".+-unknown-linux-musl"
    build-option: "static"
    reason: "import failure due to missing _testcapi"

  - module: test_code
    targets:
      - ".+-unknown-linux-musl"
    build-option: "static"
    reason: "import failure due to missing _testcapi"

  - module: test_ctypes
    targets:
      - ".+-unknown-linux-musl"
    reason: "Module import failures"

  - module: test_datetime
    targets:
      - ".+-unknown-linux-musl"
    build-option: "static"
    maximum-python-version: "3.10"
    reason: "import failure due to missing _testcapi"

  - module: test_sqlite3
    targets:
      - ".+-unknown-linux-musl"
    build-option: "static"
    maximum-python-version: "3.12"
    reason: "import failure due to missing _testcapi"

  - module: test_stable_abi_ctypes
    targets:
      - ".+-unknown-linux-musl"
    build-option: "static"
    maximum-python-version: "3.12"
    reason: "import failure due to missing _testcapi"

  - module: test_regrtest_noop1
    targets:
      - ".+-unknown-linux-musl"
    build-option: "static"
    maximum-python-version: "3.10"
    reason: "import failure due to missing _testcapi"

  # Tons of failures. Just exclude entirely instead of running.
  - module: test_traceback
    targets:
      - ".+-unknown-linux-musl"
    build-option: "static"
    reason: tons of failures, mostly due to missing _testcapi

  - module: test__xxsubinterpreters
    maximum-python-version: "3.12"
    build-option: "static"
    reason: "skipped due to missing _testcapi"

# expected-failures is a list of tests that are expected to fail.
#
# * name - pattern identifying the test or group of tests
