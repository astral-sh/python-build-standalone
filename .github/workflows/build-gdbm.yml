name: build-python-with-gdbm

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'CPython version to build'
        required: true
        default: '3.8'
        type: choice
        options:
          - '3.8'
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
          - '3.15'
      target_triple:
        description: 'Target triple'
        required: true
        default: 'x86_64-unknown-linux-gnu'
        type: choice
        options:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
      build_options:
        description: 'Build options'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - pgo+lto
          - noopt

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_COLOR: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TARGET_TRIPLE: ${{ inputs.target_triple || 'x86_64-unknown-linux-gnu' }}
      PYTHON_VERSION: ${{ inputs.python_version || '3.13' }}
      BUILD_OPTIONS: ${{ inputs.build_options || 'debug' }}
    name: ${{ inputs.target_triple || 'x86_64-unknown-linux-gnu' }} / ${{ inputs.python_version || '3.13' }} / ${{ inputs.build_options || 'debug' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: false

      - name: Cache downloads
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: build/downloads
          key: ${{ env.TARGET_TRIPLE }}-${{ hashFiles('pythonbuild/downloads.py') }}
          restore-keys: |
            ${{ env.TARGET_TRIPLE }}-

      - name: Build
        run: |
          ./build.py \
            --target-triple "${TARGET_TRIPLE}" \
            --python "cpython-${PYTHON_VERSION}" \
            --options "${BUILD_OPTIONS}"

      - name: Upload Distribution
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cpython-${{ env.PYTHON_VERSION }}-${{ env.TARGET_TRIPLE }}-${{ env.BUILD_OPTIONS }}
          path: dist/*

      - name: Cache cargo
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-pythonbuild-${{ hashFiles('Cargo.lock') }}

      - name: Build pythonbuild
        run: cargo build --release

      - name: Validate Distribution
        run: target/release/pythonbuild validate-distribution dist/*.tar.zst
